<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
        <meta charset='utf-8'>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
        <link rel="stylesheet" type="text/css" href="{{ '/assets/css/print.css' | relative_url }}" media="print">
        <!--[if lt IE 9]>
        <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
        <![endif]-->
        <!-- yo whoever added the <ie9 code above is a fucking genius -->
	  
	<title>TypeChecked - Portfolio</title>
	<meta property="og:title" content="TypeChecked">
	<meta property="og:locale" content="en_US">
	<link rel="canonical" href="https://cmumme.github.io/">
	<meta property="og:url" content="https://cmumme.github.io/">
	<meta property="og:site_name" content="cmumme.github.io">
	<meta name="twitter:card" content="summary">
	<meta property="twitter:title" content="TypeChecked">
	<script type="application/ld+json">
		{"headline":"TypeChecked","url":"https://cmumme.github.io/","@type":"WebSite","name":"cmumme.github.io","@context":"https://schema.org"}
	</script>
  </head>

  <body>
    <div id="container">
      <div class="inner">
        <header>
          <h1 align="center">TypeChecked</h1>
          <h2 align="center">{{ page.description | default: site.description | default: site.github.project_tagline }}</h2>
        </header>
        <hr>
        <section id="main_content">
          {{ content }}
        </section>
      </div>
    </div>

    {% if site.google_analytics %}
      <script>
        (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
        (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
        m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
        })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
        ga('create', '{{ site.google_analytics }}', 'auto');
        ga('send', 'pageview');
      </script>
    {% endif %}
  </body>
</html>
